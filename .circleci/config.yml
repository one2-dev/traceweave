version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Build & Publish
          # release/v* publishes to Maven Central + Plugin Portal; every other branch publishes
          # to ~/.m2 (`local`). One job covers all branches.
          command: |
            if [[ "$CIRCLE_BRANCH" == release/v* ]]; then
              bash build.sh
            else
              bash build.sh local
            fi

workflows:
  build-test-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - master
                - develop
                - pull/*
                - /^release\/v.*/
