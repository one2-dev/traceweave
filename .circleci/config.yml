version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: small
    steps:
      - checkout
      - run:
          name: Build
          command: ./gradlew clean build
      - run:
          name: Test
          command: ./gradlew test

  publish:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: small
    steps:
      - checkout
      - run:
          name: Deploy to Maven Central
          command: ./gradlew publishAllPublicationsToMavenCentralRepository
      - run:
          name: Deploy to Gradle Plugin Portal
          command: ./gradlew :gradle-plugin:publishPlugins -Pgradle.publish.key=$GRADLE_PUBLISH_KEY -Pgradle.publish.secret=$GRADLE_PUBLISH_SECRET

workflows:
  build-test-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - master
                - develop
                - pull/*
                - /^release-.*/
      - publish:
          requires:
            - build
          filters:
            branches:
              only: /^release-.*/
