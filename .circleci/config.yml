version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: medium
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build
          command: ./gradlew clean build
      - run:
          name: Test
          command: ./gradlew test
      - run:
          name: Deploy
          command: echo "Deploy step is empty for now"

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - master
                - pull/*
