version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Build
          # Same script as release, but `local` publishes to ~/.m2 instead of Maven Central.
          command: bash build.sh local

  publish:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Build & Publish
          # build.sh runs `clean build` then publishes. Reads friendly env vars
          # (GRADLE_PLUGIN_*, MAVEN_CENTRAL_*) and maps them to the gradle names internally.
          command: bash build.sh

workflows:
  build-test-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - master
                - develop
                - pull/*
      - publish:
          filters:
            branches:
              only: /^release-.*/
